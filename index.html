<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#2563eb">

    <link rel="icon"
      href="assets/images/favicon.png"
      type="image/png">

    <link rel="apple-touch-icon"
      href="assets/images/app-icon-192.png">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark.css">
    <link rel="stylesheet" href="css/animation.css">

</head>

<body>



<!-- ====================================== -->
<!-- HEADER -->
<!-- ====================================== -->

<header class="header">

    <div class="header-left">

        <h1>Expense Tracker</h1>

        <p id="greeting">
            Good Morning 👋
        </p>

    </div>

    <div class="header-right">

        <button id="themeBtn">

            <i class="fa-solid fa-moon"></i>

        </button>

    </div>

</header>



<!-- ====================================== -->
<!-- DASHBOARD -->
<!-- ====================================== -->

<main class="container">



    <!-- SUMMARY -->

    <section class="summary">

        <div class="summary-card">

            <p>Total Expense</p>

            <h2 id="totalExpense">

                ₹0.00

            </h2>

        </div>

        <div class="summary-card">

            <p>Today</p>

            <h2 id="todayExpense">

                ₹0.00

            </h2>

        </div>

        <div class="summary-card">

            <p>This Month</p>

            <h2 id="monthExpense">

                ₹0.00

            </h2>

        </div>

    </section>



    <!-- FILTERS -->

    <section class="filters">

        <button class="filter active"
                data-filter="today">

            Today

        </button>

        <button class="filter"
                data-filter="week">

            Week

        </button>

        <button class="filter"
                data-filter="month">

            Month

        </button>

        <button class="filter"
                data-filter="year">

            Year

        </button>

        <button class="filter"
                data-filter="custom">

            Custom

        </button>

    </section>



    <!-- PIE CHART -->

    <section class="card">

        <div class="card-title">
            Expense Categories
        </div>

        <div class="chart-container">
            <canvas id="categoryChart"></canvas>
        </div>

    </section>



    <!-- MONTHLY BAR GRAPH -->

    <section class="card">

        <div class="card-title">
            Monthly Spending
        </div>

        <div class="chart-container">
            <canvas id="monthlyChart"></canvas>
        </div>

    </section>



    <!-- RECENT EXPENSES -->

    <section class="card">

        <div class="card-header">

            <h2>

                Recent Expenses

            </h2>

            <button id="viewAllBtn">

                View All

            </button>

        </div>

        <div id="expenseList">

        </div>

    </section>



</main>



<!-- ====================================== -->
<!-- FLOATING BUTTON -->
<!-- ====================================== -->

<button id="addExpenseBtn">

    <i class="fa-solid fa-plus"></i>

</button>



<!-- ====================================== -->
<!-- STEP 1 -->
<!-- Amount -->
<!-- ====================================== -->

<div class="bottom-sheet"
     id="amountSheet">

    <div class="sheet">

        <h2>

            Enter Amount

        </h2>

        <input type="number"
               id="expenseAmount"
               placeholder="₹ 0">

        <button id="nextBtn">

            Next

        </button>

    </div>

</div>



<!-- ====================================== -->
<!-- STEP 2 -->
<!-- Expense Details -->
<!-- ====================================== -->

<div class="bottom-sheet"
     id="expenseSheet">

    <div class="sheet">

        <h2>

            Expense Details

        </h2>



        <select id="category">

            <option>Food</option>

            <option>Fuel</option>

            <option>Shopping</option>

            <option>Bills</option>

            <option>Medical</option>

            <option>Education</option>

            <option>Travel</option>

            <option>Entertainment</option>

            <option>Others</option>

        </select>



        <input type="text"
               id="expenseName"
               placeholder="Description">



        <input type="date"
               id="expenseDate">



        <button id="saveExpense">

            Save Expense

        </button>

    </div>

</div>

<!-- ====================================== -->
<!-- SEARCH MODAL -->
<!-- ====================================== -->

<div id="searchModal"
     class="modal">

    <div class="modal-content">

        <input type="text"
               id="searchInput"
               placeholder="Search Expense">

        <div id="searchResult">

        </div>

    </div>

</div>

<!-- ====================================== -->
<!-- LOADER -->
<!-- ====================================== -->

<div id="loader">
    <div class="spinner">

    </div>
</div>

<!-- ====================================== -->
<!-- TOAST -->
<!-- ====================================== -->

<div id="toast">

</div>

<script>
if ("serviceWorker" in navigator) {

    window.addEventListener("load", () => {

        navigator.serviceWorker.register("service-worker.js")

        .then(registration => {

            console.log(
                "Service Worker Registered",
                registration
            );

        })

        .catch(error => {

            console.error(
                "Service Worker Failed",
                error
            );

        });

    });

}
</script>

<!-- ====================================== -->
<!-- JAVASCRIPT -->
<!-- ====================================== -->

<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/theme.js"></script>
<script src="js/chart.js"></script>
<script src="js/filter.js"></script>
<script src="js/export.js"></script>
<script src="js/expense.js"></script>

</body>

</html>
